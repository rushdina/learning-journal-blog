<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Learning Journal</title>

    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,400;0,700;1,400;1,700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Logo/Site Name + Navigation -->
    <header>
      <div class="logo-nav container">
        <a href="index.html" class="logo">
          <img src="./images/logo.png" alt="My Learning Journal Logo" />
          <span>My Learning Journal</span>
        </a>
        <nav>
          <ul class="nav-links">
            <li><a href="index.html">HOME</a></li>
            <li><a href="about.html">ABOUT ME</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main>
      <section class="featured-blog">
        <div class="container" id="featured-container">
          <!-- Featured post rendered here -->
        </div>
      </section>

      <section class="blog-list">
        <div class="grid container" id="grid">
          <!-- Blog posts rendered here -->
        </div>
      </section>

      <div class="container">
        <button id="view-more" class="btn">View More</button>
      </div>
    </main>

    <footer>
      <div class="container">
        <p>My Learning Journal</p>
        <p>Copyright &copy; <span id="year"></span></p>
      </div>
    </footer>

    <script type="module" src="./js/index.js"></script>
    <script>
      document.getElementById("year").textContent = new Date().getFullYear();
    </script>
  </body>
</html>
