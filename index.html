<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Learning Journal</title>

    <link rel="stylesheet" href="./styles.css" />

    <!-- Google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,400;0,700;1,400;1,700&display=swap"
      rel="stylesheet"
    />

    <!-- FontAwesome Icon -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <!-- Logo/Site Name + Navigation -->
    <header>
      <div class="logo-nav container">
        <a href="index.html" class="logo-link">
          <img
            src="./images/logo.png"
            alt="My Learning Journal Logo"
            class="logo"
          />
          <span>My Learning Journal</span>
        </a>

        <nav>
          <button id="hamburger" class="hamburger" aria-label="Toggle menu">
            <i class="fa-solid fa-bars" id="menu-icon"></i>
          </button>
          <ul class="nav-links">
            <li><a href="index.html">HOME</a></li>
            <li><a href="about.html">ABOUT ME</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main>
      <section class="featured-blog">
        <div id="featured-container">
          <!-- Featured post rendered here -->
        </div>
      </section>

      <section class="blog-list">
        <div class="grid container" id="grid" aria-live="polite">
          <!-- Blog posts rendered here -->
        </div>
      </section>

      <div class="view-more-container container">
        <button id="view-more" class="btn view-more-btn">View More</button>
      </div>
    </main>

    <footer>
      <div class="footer-text">
        <p><b>My Learning Journal</b></p>
        <p>Copyright &copy; <span id="year"></span></p>
      </div>
    </footer>

    <script src="./js/navbar.js" type="module"></script>
    <script src="./js/index.js" type="module"></script>
    <script>
      document.getElementById("year").textContent = new Date().getFullYear();
    </script>
  </body>
</html>
